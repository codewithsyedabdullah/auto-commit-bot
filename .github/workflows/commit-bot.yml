name: Daily 50 Commits

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make 50 commits
        run: |
          git config user.name "Syed Abdullah Yaqoob"
          git config user.email "abdullah2684511@gmail.com"
          for i in $(seq 1 50); do
            TS=$(date -d "+$i seconds" "+%Y-%m-%d %H:%M:%S")
            echo "Commit #$i - $TS" >> activity.log
            git add activity.log
            GIT_AUTHOR_DATE="$TS" GIT_COMMITTER_DATE="$TS" git commit -m "Daily commit $i"
          done

      - name: Push changes
        run: |
          git push
